<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Feedback Form</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Internal CSS */
        .error {
            color: #e74c3c;
            font-size: 0.875rem;
            margin-top: 5px;
            display: none;
        }
        
        .success {
            color: #27ae60;
            font-size: 1rem;
            text-align: center;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Student Feedback Registration Form</h1>
        
        <form id="feedbackForm" novalidate>
            <div class="form-group">
                <label for="name">Name <span class="required">*</span></label>
                <input type="text" id="name" name="name" placeholder="Enter your full name">
                <div class="error" id="nameError">Name is required</div>
            </div>

            <div class="form-group">
                <label for="email">Email <span class="required">*</span></label>
                <input type="email" id="email" name="email" placeholder="Enter your email">
                <div class="error" id="emailError">Please enter a valid email</div>
            </div>

            <div class="form-group">
                <label for="mobile">Mobile <span class="required">*</span></label>
                <input type="text" id="mobile" name="mobile" placeholder="Enter 10-digit mobile number">
                <div class="error" id="mobileError">Mobile number must be exactly 10 digits</div>
            </div>

            <div class="form-group">
                <label for="department">Department <span class="required">*</span></label>
                <select id="department" name="department">
                    <option value="">Select Department</option>
                    <option value="Computer Science">Computer Science</option>
                    <option value="Information Technology">Information Technology</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Mechanical">Mechanical</option>
                    <option value="Civil">Civil</option>
                </select>
                <div class="error" id="departmentError">Please select a department</div>
            </div>

            <div class="form-group">
                <label>Gender <span class="required">*</span></label>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="gender" value="Male"> Male
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="gender" value="Female"> Female
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="gender" value="Other"> Other
                    </label>
                </div>
                <div class="error" id="genderError">Please select a gender</div>
            </div>

            <div class="form-group">
                <label for="feedback">Feedback <span class="required">*</span></label>
                <textarea id="feedback" name="feedback" rows="5" placeholder="Enter your feedback (minimum 10 words)"></textarea>
                <div class="error" id="feedbackError">Feedback must contain at least 10 words</div>
            </div>

            <div class="button-group">
                <button type="submit" class="btn btn-submit">Submit</button>
                <button type="reset" class="btn btn-reset">Reset</button>
            </div>

            <div class="success" id="successMessage">Form submitted successfully!</div>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
